name: ✅ Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  validate-pr-metadata:
    name: ✅ Validate PR Metadata
    runs-on: ubuntu-latest

    steps:
      - name: Validate target branch
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ "$BASE_REF" != "staging" ]; then
            echo "Pull requests must target the staging branch. Current target: $BASE_REF"
            exit 1
          fi

      - name: Validate PR title prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! grep -Eq '^(fix|chore|feat|sync|docs)(\([^)]+\))?!?:[[:space:]].+' <<< "$PR_TITLE"; then
            echo "PR title must start with one of: fix:, chore:, feat:, sync:, docs:"
            echo "Current title: $PR_TITLE"
            exit 1
          fi

  block-default-user-state:
    name: ✅ Block tracked default-user state
    runs-on: ubuntu-latest
    if: always() && github.event.action != 'edited'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
            ref: ${{ github.event.pull_request.head.sha }}
            repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Ensure default-user state is not tracked
        run: |
          tracked_files="$(git ls-files 'data/default-user/**')"
          if [ -n "$tracked_files" ]; then
            echo 'Tracked files under data/default-user are not allowed.'
            echo "$tracked_files"
            exit 1
          fi

  run-eslint:
    name: ✅ Check ESLint on PR
    runs-on: ubuntu-latest
    # Only needs to run when code is changed
    if: always() && github.event.action != 'edited'

    steps:
      - name: Checkout Repository
        # Checkout
        # https://github.com/marketplace/actions/checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
            ref: ${{ github.event.pull_request.head.sha }}
            repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node.js
        # Setup Node.js environment
        # https://github.com/marketplace/actions/setup-node-js-environment
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 24

      - name: Run npm install
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint

  run-tests:
    name: ✅ Run Unit Tests on PR
    runs-on: ubuntu-latest
    # Only needs to run when code is changed
    if: always() && github.event.action != 'edited'

    steps:
      - name: Checkout Repository
        # Checkout
        # https://github.com/marketplace/actions/checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
            ref: ${{ github.event.pull_request.head.sha }}
            repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node.js
        # Setup Node.js environment
        # https://github.com/marketplace/actions/setup-node-js-environment
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 24

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install test dependencies
        run: npm ci --ignore-scripts --prefix tests

      - name: Run unit tests
        run: npm run test:unit --prefix tests

  frontend-budgets:
    name: ✅ Check Frontend Assets
    runs-on: ubuntu-latest
    if: always() && github.event.action != 'edited'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
            ref: ${{ github.event.pull_request.head.sha }}
            repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 24

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Run frontend budget check
        run: npm run check:frontend-budgets

      - name: Build frontend assets
        run: npm run build:frontend

  run-bun-checks:
    name: ✅ Check Bun Runtime
    runs-on: ubuntu-latest
    if: always() && github.event.action != 'edited'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
            ref: ${{ github.event.pull_request.head.sha }}
            repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies with Bun
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run Bun startup smoke
        run: bun src/server-init.js
