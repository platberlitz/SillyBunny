services:
  sillybunny:
    build: ..
    container_name: sillybunny
    hostname: sillybunny
    image: sillybunny:latest
    environment:
      - NODE_ENV=production
      - FORCE_COLOR=1
      - SILLYTAVERN_HEARTBEATINTERVAL=30
      # Match container-created files to your host user and group by default.
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    ports:
      - "4444:4444"
    volumes:
      - "./config:/home/bun/app/config"
      - "./data:/home/bun/app/data"
      - "./plugins:/home/bun/app/plugins"
      - "./extensions:/home/bun/app/public/scripts/extensions/third-party"
    healthcheck:
      test: ["CMD", "bun", "src/healthcheck.js"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped
