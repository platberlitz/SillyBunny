<div class="guided-generations-settingslist">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Guided Generations</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="gg-settings-grid">
                <label class="checkbox_label">
                    <input type="checkbox" id="gg_showSimpleSendButton" name="showSimpleSendButton" class="gg-setting-input">
                    <span>Simple Send button</span>
                </label>
                <label class="checkbox_label">
                    <input type="checkbox" id="gg_showRecoverInputButton" name="showRecoverInputButton" class="gg-setting-input">
                    <span>Recover Input button</span>
                </label>
                <label class="checkbox_label">
                    <input type="checkbox" id="gg_showGuidedResponse" name="showGuidedResponse" class="gg-setting-input">
                    <span>Guided Response button</span>
                </label>
                <label class="checkbox_label">
                    <input type="checkbox" id="gg_showGuidedSwipe" name="showGuidedSwipe" class="gg-setting-input">
                    <span>Guided Swipe button</span>
                </label>
                <label class="checkbox_label">
                    <input type="checkbox" id="gg_showImpersonate1stPerson" name="showImpersonate1stPerson" class="gg-setting-input">
                    <span>Guided Impersonate button</span>
                </label>
                <label class="checkbox_label">
                    <input type="checkbox" id="gg_integrateQrBar" name="integrateQrBar" class="gg-setting-input">
                    <span>Integrate Quick Reply bar</span>
                </label>
                <label class="checkbox_label">
                    <input type="checkbox" id="gg_debugMode" name="debugMode" class="gg-setting-input">
                    <span>Debug logging</span>
                </label>
            </div>

            <hr>

            <div class="setting_item">
                <label for="gg_injectionEndRole">Injection role</label>
                <select id="gg_injectionEndRole" name="injectionEndRole" class="gg-setting-input text_pole select_compact">
                    <option value="system">System</option>
                    <option value="assistant">Assistant</option>
                    <option value="user">User</option>
                </select>
            </div>

            <div class="setting_item">
                <label for="gg_promptGuidedResponse">Guided Response prompt</label>
                <textarea id="gg_promptGuidedResponse" name="promptGuidedResponse" class="gg-setting-input text_pole gg-prompt-field" rows="3"></textarea>
                <div class="flex-container flexGap5">
                    <label for="gg_depthPromptGuidedResponse">Depth</label>
                    <input id="gg_depthPromptGuidedResponse" name="depthPromptGuidedResponse" class="gg-setting-input text_pole" type="number" min="0" step="1">
                    <button type="button" class="menu_button gg-default-button" data-target="promptGuidedResponse">Reset</button>
                </div>
            </div>

            <div class="setting_item">
                <label for="gg_promptGuidedSwipe">Guided Swipe prompt</label>
                <textarea id="gg_promptGuidedSwipe" name="promptGuidedSwipe" class="gg-setting-input text_pole gg-prompt-field" rows="3"></textarea>
                <div class="flex-container flexGap5">
                    <label for="gg_depthPromptGuidedSwipe">Depth</label>
                    <input id="gg_depthPromptGuidedSwipe" name="depthPromptGuidedSwipe" class="gg-setting-input text_pole" type="number" min="0" step="1">
                    <button type="button" class="menu_button gg-default-button" data-target="promptGuidedSwipe">Reset</button>
                </div>
            </div>

            <div class="setting_item">
                <label for="gg_promptImpersonate1st">Guided Impersonate prompt</label>
                <textarea id="gg_promptImpersonate1st" name="promptImpersonate1st" class="gg-setting-input text_pole gg-prompt-field" rows="3"></textarea>
                <button type="button" class="menu_button gg-default-button" data-target="promptImpersonate1st">Reset</button>
            </div>

            <div class="setting_item">
                <div class="gg-profile-row">
                    <label for="gg_profileImpersonate1st">Impersonate profile</label>
                    <select id="gg_profileImpersonate1st" name="profileImpersonate1st" class="gg-setting-input text_pole"></select>
                    <label for="gg_presetImpersonate1st">Preset</label>
                    <select id="gg_presetImpersonate1st" name="presetImpersonate1st" class="gg-setting-input text_pole"></select>
                    <button type="button" id="gg_refreshProfiles" class="menu_button menu_button_icon fa-solid fa-rotate" title="Refresh profiles and presets"></button>
                </div>
            </div>
        </div>
    </div>
</div>
