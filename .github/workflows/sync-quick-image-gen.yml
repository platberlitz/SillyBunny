name: Sync Quick Image Gen

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Quick Image Gen ref to sync
        required: false
        default: main
  repository_dispatch:
    types:
      - quick-image-gen-update

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-quick-image-gen
  cancel-in-progress: false

jobs:
  sync-quick-image-gen:
    runs-on: ubuntu-latest

    steps:
      - name: Check GitHub App Configuration
        id: app-config
        env:
          ST_BOT_APP_ID: ${{ vars.ST_BOT_APP_ID }}
          ST_BOT_PRIVATE_KEY: ${{ secrets.ST_BOT_PRIVATE_KEY }}
        run: |
          if [ -n "$ST_BOT_APP_ID" ] && [ -n "$ST_BOT_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint App Token
        if: steps.app-config.outputs.enabled == 'true'
        id: app
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.ST_BOT_APP_ID }}
          private-key: ${{ secrets.ST_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout staging
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: staging
          token: ${{ steps.app.outputs.token || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 24

      - name: Resolve upstream ref
        id: upstream
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
          PAYLOAD_REF: ${{ github.event.client_payload.ref }}
        run: |
          ref="${INPUT_REF:-${PAYLOAD_REF:-main}}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Sync bundled extension
        id: sync
        env:
          UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: |
          metadata_file="$RUNNER_TEMP/quick-image-gen.env"
          bash scripts/sync-quick-image-gen.sh --ref "$UPSTREAM_REF" --metadata-file "$metadata_file"
          . "$metadata_file"
          {
            echo "version=$QIG_VERSION"
            echo "commit=$QIG_COMMIT"
            echo "short_commit=$QIG_SHORT_COMMIT"
            echo "ref=$QIG_REF"
            echo "repo=$QIG_REPO"
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ steps.app.outputs.token || github.token }}
          base: staging
          branch: chore/auto-sync-quick-image-gen
          delete-branch: true
          add-paths: |
            public/scripts/extensions/quick-image-gen/index.js
            public/scripts/extensions/quick-image-gen/manifest.json
            public/scripts/extensions/quick-image-gen/style.css
          commit-message: 'chore: sync Quick Image Gen v${{ steps.sync.outputs.version }}'
          title: 'chore: sync Quick Image Gen v${{ steps.sync.outputs.version }}'
          labels: |
            sync
          body: |
            ## Summary
            - Syncs bundled Quick Image Gen from `${{ steps.sync.outputs.repo }}` ref `${{ steps.sync.outputs.ref }}`.
            - Upstream commit: [`${{ steps.sync.outputs.short_commit }}`](https://github.com/platberlitz/sillytavern-image-gen/commit/${{ steps.sync.outputs.commit }}).
            - Keeps the SillyBunny vendored manifest overrides for `author` and `manifest_version` while taking the rest from upstream.

            ## Notes
            - This PR was opened by the manually triggered Quick Image Gen sync workflow or the upstream repository dispatch hook.
            - The bundled files under `public/scripts/extensions/quick-image-gen/` are generated by `scripts/sync-quick-image-gen.sh`.
