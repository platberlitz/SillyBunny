<ul class="profile-summary--two-col">
    {{#each profile}}
    <li>
        <strong class="profile-summary-label" data-i18n="{{@key}}">{{@key}}</strong>
        <span class="profile-summary-value">{{this}}</span>
    </li>
    {{/each}}
</ul>
{{#if omitted}}
<div class="margin5">
    <strong data-i18n="Omitted Settings:">Omitted Settings:</strong>&nbsp;<span>{{omitted}}</span>
</div>
{{/if}}
