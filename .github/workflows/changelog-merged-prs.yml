name: Changelog Merged PRs

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: changelog-merged-prs-staging
  cancel-in-progress: false

jobs:
  record-merged-pr:
    name: Record merged staging PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'staging'

    steps:
      - name: Check GitHub App Configuration
        id: app-config
        env:
          ST_BOT_APP_ID: ${{ vars.ST_BOT_APP_ID }}
          ST_BOT_PRIVATE_KEY: ${{ secrets.ST_BOT_PRIVATE_KEY }}
        run: |
          if [ -n "$ST_BOT_APP_ID" ] && [ -n "$ST_BOT_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint App Token
        if: steps.app-config.outputs.enabled == 'true'
        id: app
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.ST_BOT_APP_ID }}
          private-key: ${{ secrets.ST_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout staging
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: staging
          token: ${{ steps.app.outputs.token || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 24

      - name: Update changelog
        env:
          GH_TOKEN: ${{ steps.app.outputs.token || github.token }}
        run: |
          git pull --ff-only origin staging
          node scripts/update-changelog-merged-prs.js --pr "${{ github.event.pull_request.number }}"

      - name: Commit changelog update
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if git diff --quiet -- changelog.md; then
            echo "changelog.md already records PR #${PR_NUMBER}."
            exit 0
          fi

          git add changelog.md
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "docs(changelog): record merged PR #${PR_NUMBER}"
          git push
